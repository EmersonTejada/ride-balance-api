stages:
  - build
  - test
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

build_api:
  stage: build
  image: docker:28.2.2
  services:
    - docker:28.2.2-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME

test_api:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm test

deploy_to_prod:
  stage: deploy
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    script:
      - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $IMAGE_NAME &&
        docker stop ride-balance-api || true &&
        docker rm ride-balance-api || true &&


        docker run --rm -e DATABASE_URL=\"${PRODUCTION_DATABASE_URL}\" $IMAGE_NAME npx prisma migrate deploy &&

        docker run -d \
        --name ride-balance-api \
        --restart always \
        -p 3000:3000 \
        -e DATABASE_URL=\"${PRODUCTION_DATABASE_URL}\" \
        -e JWT_SECRET=\"${PRODUCTION_JWT_SECRET}\" \
        -e NODE_ENV='production' \
        $IMAGE_NAME &&
        docker image prune -f
        "
