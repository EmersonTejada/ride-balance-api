global: 
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100'] 

  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080'] 

  - job_name: 'ride-balance-api'
    scrape_interval: 15s
    static_configs:
      - targets: ['ride-balance-api:3000']
    metrics_path: '/api/metrics' 

      