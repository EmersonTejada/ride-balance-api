services:
  ride-balance-api:
    image: ${IMAGE_PROD}
    restart: always
    environment:
      - DATABASE_URL=${PRODUCTION_DATABASE_URL}
      - JWT_SECRET=${PRODUCTION_JWT_SECRET}
      - NODE_ENV=production
      - PORT=${PORT}
    networks:
      - ride-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ~/ssl:/etc/nginx/ssl:ro
    depends_on:
      - ride-balance-api
    networks:
      - ride-net

networks:
  ride-net:
    driver: bridge
